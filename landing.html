<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F5F1E8">
<title>xiaopingfeng · 心理学小工具集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F5F1E8;
    --paper-dark: #E8E2D3;
    --ink: #1A1714;
    --ink-soft: #4A4540;
    --ink-faint: #8A8278;
    --accent: #C44536;
    --line: #D4CCB8;
    --serif: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', serif;
    --sans: 'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', sans-serif;
    --mono: 'JetBrains Mono', 'Menlo', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
  }
  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 64px 28px 48px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--line);
    padding-bottom: 12px;
    display: flex;
    justify-content: space-between;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 900;
    font-size: 44px;
    line-height: 1.1;
    margin: 64px 0 16px;
    letter-spacing: -0.02em;
  }
  .lede {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.7;
    color: var(--ink-soft);
    margin: 0 0 48px;
  }
  .apps-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .app-card {
    display: block;
    text-decoration: none;
    color: inherit;
    padding: 20px 22px;
    background: var(--paper-dark);
    border-left: 3px solid var(--accent);
    margin-bottom: 14px;
    transition: transform 0.15s ease;
  }
  .app-card:hover { transform: translateX(4px); }
  .app-card-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .app-card-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .app-card-desc {
    font-family: var(--serif);
    font-size: 14px;
    line-height: 1.65;
    color: var(--ink-soft);
  }
  .app-card-arrow {
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }
  footer {
    margin-top: auto;
    padding-top: 32px;
    border-top: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="meta">
      <span>xiaopingfeng.com</span>
      <span>2026</span>
    </div>

    <h1>心理学<br>小工具集</h1>
    <p class="lede">一组用最小可测产品做心理测量探索的小工具。每个项目都是一份"严肃的趣味性"——博弈论、SJT、情境测量替代刻板的人格量表。</p>

    <div class="apps-eyebrow">— 当前作品 —</div>

    <a class="app-card" href="/app/the-stall/">
      <div class="app-card-title">距离测试</div>
      <div class="app-card-meta">v0.1 · 8 个场景 · 约 5 分钟</div>
      <div class="app-card-desc">基于厕所空间选择的多情境心理测量工具——用博弈论复盘 + Gerlach (2018) 四类型框架替代 MBTI。</div>
      <div class="app-card-arrow">开始测试 →</div>
    </a>

    <footer>fxp007 · 2026</footer>
  </div>
</body>
</html>
